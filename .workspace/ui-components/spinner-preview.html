<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantify Spinner — Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F0F4FA;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 24px;
    }

    h1 {
      color: #1B6CB2;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(27, 108, 178, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .card-dark {
      background: #1B2A3B;
    }

    .label {
      font-size: 0.75rem;
      color: #6B7C93;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .label-dark { color: #8AA3BE; }

    /* ─── Spinner styles ─────────────────────────── */
    .q-spinner { display: inline-flex; }
    .q-spinner svg { display: block; overflow: visible; }
    .q-spinner--sm  svg { width: 24px;  height: 24px;  }
    .q-spinner--md  svg { width: 40px;  height: 40px;  }
    .q-spinner--lg  svg { width: 64px;  height: 64px;  }
    .q-spinner--xl  svg { width: 96px;  height: 96px;  }

    .q-arc {
      transform-origin: 50px 50px;
      animation: q-spin 1.1s linear infinite;
    }
    .q-sq-a { animation: q-pulse 1.5s ease-in-out infinite; }
    .q-sq-b { animation: q-pulse 1.5s ease-in-out infinite 0.45s; }

    @keyframes q-spin  { to { transform: rotate(360deg); } }
    @keyframes q-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <h1>Quantify — AppSpinner</h1>

  <!-- Tamaños sobre fondo claro -->
  <div class="row">
    <div class="card">
      <div class="q-spinner q-spinner--sm">
        <svg viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="40" stroke="#D6E4F7" stroke-width="9"/>
          <circle class="q-arc" cx="50" cy="50" r="40" stroke="#1B6CB2" stroke-width="9"
                  stroke-linecap="round" stroke-dasharray="251.3" stroke-dashoffset="62.8"/>
          <rect class="q-sq-a" x="55" y="55" width="14" height="14" rx="2.5" fill="#F5A520"/>
          <rect class="q-sq-b" x="70" y="70" width="10" height="10" rx="2.5" fill="#F5A520"/>
        </svg>
      </div>
      <span class="label">sm · 24px</span>
    </div>

    <div class="card">
      <div class="q-spinner q-spinner--md">
        <svg viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="40" stroke="#D6E4F7" stroke-width="9"/>
          <circle class="q-arc" cx="50" cy="50" r="40" stroke="#1B6CB2" stroke-width="9"
                  stroke-linecap="round" stroke-dasharray="251.3" stroke-dashoffset="62.8"/>
          <rect class="q-sq-a" x="55" y="55" width="14" height="14" rx="2.5" fill="#F5A520"/>
          <rect class="q-sq-b" x="70" y="70" width="10" height="10" rx="2.5" fill="#F5A520"/>
        </svg>
      </div>
      <span class="label">md · 40px</span>
    </div>

    <div class="card">
      <div class="q-spinner q-spinner--lg">
        <svg viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="40" stroke="#D6E4F7" stroke-width="9"/>
          <circle class="q-arc" cx="50" cy="50" r="40" stroke="#1B6CB2" stroke-width="9"
                  stroke-linecap="round" stroke-dasharray="251.3" stroke-dashoffset="62.8"/>
          <rect class="q-sq-a" x="55" y="55" width="14" height="14" rx="2.5" fill="#F5A520"/>
          <rect class="q-sq-b" x="70" y="70" width="10" height="10" rx="2.5" fill="#F5A520"/>
        </svg>
      </div>
      <span class="label">lg · 64px</span>
    </div>

    <div class="card">
      <div class="q-spinner q-spinner--xl">
        <svg viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="40" stroke="#D6E4F7" stroke-width="9"/>
          <circle class="q-arc" cx="50" cy="50" r="40" stroke="#1B6CB2" stroke-width="9"
                  stroke-linecap="round" stroke-dasharray="251.3" stroke-dashoffset="62.8"/>
          <rect class="q-sq-a" x="55" y="55" width="14" height="14" rx="2.5" fill="#F5A520"/>
          <rect class="q-sq-b" x="70" y="70" width="10" height="10" rx="2.5" fill="#F5A520"/>
        </svg>
      </div>
      <span class="label">xl · 96px</span>
    </div>
  </div>

  <!-- Sobre fondo oscuro -->
  <div class="row">
    <div class="card card-dark">
      <div class="q-spinner q-spinner--xl">
        <svg viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="40" stroke="#1E3A5F" stroke-width="9"/>
          <circle class="q-arc" cx="50" cy="50" r="40" stroke="#4AA3E8" stroke-width="9"
                  stroke-linecap="round" stroke-dasharray="251.3" stroke-dashoffset="62.8"/>
          <rect class="q-sq-a" x="55" y="55" width="14" height="14" rx="2.5" fill="#F5A520"/>
          <rect class="q-sq-b" x="70" y="70" width="10" height="10" rx="2.5" fill="#F5A520"/>
        </svg>
      </div>
      <span class="label label-dark">dark mode · xl</span>
    </div>
  </div>

</body>
</html>
