<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantify — Skeleton · Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #E8EFF8;
      min-height: 100vh;
      padding: 28px 24px 80px;
    }
    body::before {
      content: "";
      display: block;
      height: 4px;
      background: linear-gradient(90deg, #1B6CB2 0%, #1B6CB2 60%, #F5A520 100%);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes pulse   { 0%,100% { opacity:.45; } 50% { opacity:.9; } }

    .sk      { display:inline-block; background:linear-gradient(90deg,#D8E8F5 25%,#EDF5FC 50%,#D8E8F5 75%); background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite; border-radius:4px; }
    .sk.block{ display:block; width:100%; }
    .sk-warm { display:inline-block; background:linear-gradient(90deg,#F5E3C0 25%,#FBF2E0 50%,#F5E3C0 75%); background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite; border-radius:4px; }
    .sk-green{ display:inline-block; background:linear-gradient(90deg,#C8F0D8 25%,#E5F8EE 50%,#C8F0D8 75%); background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite; border-radius:4px; }
    .sk-red  { display:inline-block; background:linear-gradient(90deg,#FECDCD 25%,#FFE8E8 50%,#FECDCD 75%); background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite; border-radius:4px; }
    .sk-side { display:inline-block; background:linear-gradient(90deg,rgba(255,255,255,.07) 25%,rgba(255,255,255,.18) 50%,rgba(255,255,255,.07) 75%); background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite; border-radius:4px; }
    .sk-side.block{ display:block; width:100%; }

    .section-label { font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#5A6E84; margin:28px 0 12px; display:flex; align-items:center; gap:10px; }
    .section-label::before { content:""; width:12px; height:12px; flex-shrink:0; background: #F5A520 0 0/5px 5px no-repeat, #F5A520 7px 7px/5px 5px no-repeat; }

    .app-shell { display:flex; height:580px; border-radius:14px; overflow:hidden; box-shadow:0 4px 28px rgba(0,0,0,.16); }

    /* ── Sidebar ── */
    .sidebar { width:132px; background:#0C2645; flex-shrink:0; display:flex; flex-direction:column; }
    .sidebar-brand { display:flex; align-items:center; gap:8px; padding:20px 14px 16px; border-bottom:1px solid rgba(255,255,255,.08); }
    .brand-logo-sk svg { width:28px; height:28px; animation:pulse 1.6s ease-in-out infinite; }
    .sidebar-nav { padding:10px 8px; display:flex; flex-direction:column; gap:4px; }
    .nav-item-sk { display:flex; align-items:center; gap:8px; padding:8px; border-radius:7px; }
    .nav-item-sk.active { background:rgba(255,255,255,.12); }
    .nav-icon-sk { width:16px; height:16px; border-radius:3px; flex-shrink:0; }
    .nav-text-sk { height:10px; border-radius:3px; }

    /* ── Main ── */
    .main { flex:1; background:#F5F7FA; display:flex; flex-direction:column; overflow:hidden; }
    .topbar { background:#fff; border-bottom:1px solid #E8EEF5; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; }
    .greeting-block { display:flex; flex-direction:column; gap:5px; }
    .topbar-actions { display:flex; align-items:center; gap:10px; }
    .content { flex:1; overflow-y:auto; padding:16px 20px; }

    /* ── Stat cards ── */
    .stat-row { display:grid; gap:12px; margin-bottom:14px; }
    .stat-row.cols-4 { grid-template-columns:repeat(4,1fr); }
    .stat-row.cols-3 { grid-template-columns:repeat(3,1fr); }
    .stat-card { background:#fff; border:1px solid #E8EEF5; border-radius:10px; padding:14px 16px; }
    .stat-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
    .stat-icon { width:22px; height:22px; border-radius:5px; }
    .stat-amount { height:22px; border-radius:5px; margin-bottom:6px; }
    .stat-desc { height:10px; border-radius:3px; }
    .stat-bottom { display:flex; justify-content:flex-end; margin-top:8px; }
    .stat-trend { height:11px; width:38px; border-radius:3px; }

    /* ── Charts ── */
    .charts-row { display:grid; grid-template-columns:2fr 1fr; gap:12px; margin-bottom:14px; }
    .bottom-row  { display:grid; grid-template-columns:2fr 1fr; gap:12px; }
    .chart-card { background:#fff; border:1px solid #E8EEF5; border-radius:10px; padding:14px 16px; }
    .chart-area { width:100%; height:160px; }
    .chart-donut { width:100%; height:160px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; }
    .donut-ring { width:100px; height:100px; }
    .donut-legend { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
    .legend-item { display:flex; align-items:center; gap:4px; }
    .legend-dot { width:7px; height:7px; border-radius:9999px; }

    /* ── Bar chart ── */
    .bar-chart { display:flex; flex-direction:column; gap:10px; padding-top:4px; }
    .bar-row { display:flex; align-items:center; gap:8px; }
    .bar-track { flex:1; height:14px; background:#F0F5FA; border-radius:4px; overflow:hidden; }
    .bar-fill  { height:100%; border-radius:4px; background:linear-gradient(90deg,#C0D8EF 25%,#D8EBF8 50%,#C0D8EF 75%); background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite; }

    /* ── Recent bills ── */
    .recent-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .bill-item { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid #F2F5FA; }
    .bill-item:last-child { border-bottom:none; }
    .bill-left { display:flex; flex-direction:column; gap:4px; }
    .bill-right { display:flex; align-items:center; gap:8px; }
    .bill-dot { width:8px; height:8px; border-radius:9999px; flex-shrink:0; }

    /* ── Filter bar ── */
    .filter-bar { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
    .q-search-btn { width:34px; height:34px; flex-shrink:0; background:linear-gradient(90deg,#1565A8 25%,#2278C8 50%,#1565A8 75%); background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite; border-radius:8px; display:flex; align-items:center; justify-content:center; }
    .q-search-btn svg { width:18px; height:18px; }

    /* ── Bill table ── */
    .bill-table { background:#fff; border:1px solid #E8EEF5; border-radius:10px; overflow:hidden; }
    .bill-row { display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid #F2F5FA; gap:0; }
    .bill-row:last-child { border-bottom:none; }
    .cell-status { width:110px; flex-shrink:0; display:flex; align-items:center; gap:6px; }
    .status-dot { width:9px; height:9px; border-radius:9999px; flex-shrink:0; }
    .cell-data { flex:1; display:flex; flex-direction:column; gap:4px; }
    .cell-icon-label { display:flex; align-items:center; gap:4px; }
    .cell-icon-sk { width:11px; height:11px; border-radius:2px; flex-shrink:0; }
    .cell-action { width:80px; flex-shrink:0; display:flex; justify-content:flex-end; }

    /* ── Pagination ── */
    .bill-pagination { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; }
    .pag-controls { display:flex; align-items:center; gap:6px; }
    .pag-arrows { display:flex; gap:4px; }
  </style>
</head>
<body>
